<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo-icon-dark.svg?v=2" />
    <link rel="shortcut icon" href="/logo-icon-dark.svg?v=2" />
    <link rel="apple-touch-icon" href="/logo-icon-dark.svg?v=2" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="AgentEasePro - The all-in-one workspace for Utah real estate agents. Draft REPCs, track deadlines, manage clients, and launch marketing from one beautiful interface." />
    <meta name="keywords" content="Utah real estate, REPC, real estate CRM, Utah agents, real estate software" />
    <meta property="og:title" content="AgentEasePro - One workspace for Utah deals, deadlines, and referrals" />
    <meta property="og:description" content="Draft REPCs, track every contract date, stay on top of your sphere, and launch listing marketing—without juggling PDFs, spreadsheets, and generic CRMs." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://agenteasepro.com" />
    <meta property="og:image" content="https://agenteasepro.com/logo-dark-mode-gold.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AgentEasePro - One workspace for Utah deals, deadlines, and referrals" />
    <meta name="twitter:description" content="Draft REPCs, track every contract date, stay on top of your sphere, and launch listing marketing—without juggling PDFs, spreadsheets, and generic CRMs." />
    <meta name="twitter:image" content="https://agenteasepro.com/logo-dark-mode-gold.svg" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="canonical" href="https://agenteasepro.com/" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <title>AgentEasePro | Utah Real Estate Workspace</title>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "AgentEasePro",
      "url": "https://agenteasepro.com",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "The all-in-one workspace for Utah real estate agents. Draft REPCs, track deadlines, manage clients, e-sign contracts, and launch marketing.",
      "offers": {
        "@type": "Offer",
        "price": "49.99",
        "priceCurrency": "USD",
        "priceValidUntil": "2027-12-31"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "ratingCount": "200",
        "bestRating": "5"
      },
      "publisher": {
        "@type": "Organization",
        "name": "AgentEasePro",
        "url": "https://agenteasepro.com",
        "logo": "https://agenteasepro.com/logo-dark-mode-gold.svg",
        "contactPoint": {
          "@type": "ContactPoint",
          "email": "hello@agenteasepro.com",
          "contactType": "customer support"
        }
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!-- Netlify form detection (hidden forms for the build bot) -->
    <form name="newsletter" netlify netlify-honeypot="bot-field" hidden>
      <input name="bot-field" />
      <input name="email" type="email" />
    </form>
    <form name="book-demo" netlify netlify-honeypot="bot-field" hidden>
      <input name="bot-field" />
      <input name="name" />
      <input name="email" type="email" />
      <input name="phone" type="tel" />
      <input name="brokerage" />
      <textarea name="message"></textarea>
    </form>
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input name="bot-field" />
      <input name="name" />
      <input name="email" type="email" />
      <select name="subject"></select>
      <textarea name="message"></textarea>
    </form>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
