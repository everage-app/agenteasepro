<svg width="400" height="100" viewBox="0 0 400 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- AgentEasePro Logo - Dark Mode with Gold Pro Badge (matches app style) -->
  
  <!-- Logo Icon -->
  <g transform="translate(10, 15)">
    <!-- Back square (behind, offset to upper-right) -->
    <rect x="18" y="4" width="44" height="44" rx="7" stroke="white" stroke-width="2.5" fill="none"/>
    
    <!-- Front square with solid fill -->
    <rect x="4" y="18" width="44" height="44" rx="7" stroke="white" stroke-width="2.5" fill="#0f172a"/>
    
    <!-- House icon inside front square -->
    <g transform="translate(9, 25)">
      <!-- House roof and body -->
      <path d="M17 3L3 14V31H31V14L17 3Z" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <!-- Door -->
      <rect x="12" y="18" width="9" height="13" rx="1" stroke="white" stroke-width="2" fill="none"/>
      <!-- Door handle -->
      <circle cx="18" cy="24" r="1.5" fill="white"/>
    </g>
  </g>
  
  <!-- Text: AgentEase -->
  <text x="90" y="60" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="36" font-weight="700" fill="white">
    <tspan font-weight="700">Agent</tspan><tspan font-weight="400">Ease</tspan>
  </text>
  
  <!-- Pro badge - Gold background with white text -->
  <rect x="277" y="38" width="45" height="28" rx="5" fill="#f4b860"/>
  <text x="300" y="58" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="600" fill="white" text-anchor="middle">Pro</text>
</svg>
