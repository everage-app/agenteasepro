<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <link rel="shortcut icon" href="/favicon.svg?v=2" />
    <link rel="apple-touch-icon" href="/favicon.svg?v=2" />
    <title>AgentEasePro — Utah real estate contracts & marketing</title>
    <meta name="description" content="AgentEasePro helps Utah real estate agents draft REPCs and addenda, manage deals, send e-sign packets, and market listings from a single modern platform." />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
    <!-- Mobile optimization meta tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#020617" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#fafbff" media="(prefers-color-scheme: light)" />
    <!-- Prevent telephone number detection on iOS -->
    <meta name="format-detection" content="telephone=no" />
    <style>
      /* Initial loading state - prevents blank screen */
      #app-loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #020617;
        z-index: 9999;
        transition: opacity 0.3s ease-out;
      }
      #app-loading.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #app-loading .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(56, 189, 248, 0.2);
        border-top-color: #38bdf8;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      /* Hide loading once app mounts */
      #root:not(:empty) + #app-loading,
      #root:has(*) ~ #app-loading {
        display: none;
      }
    </style>
  </head>
  <body class="bg-[#020617]">
    <div id="root"></div>
    <div id="app-loading" aria-label="Loading AgentEasePro">
      <div class="spinner"></div>
    </div>
    <div id="app-crash" style="display:none;position:fixed;inset:0;z-index:10000;background:#0b1220;color:#e2e8f0;padding:24px;font:600 14px system-ui;">
      <div style="max-width:720px;margin:0 auto;">
        <div style="font-size:18px;margin-bottom:8px;">App failed to load</div>
        <div id="app-crash-message" style="font:500 12px/1.5 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;white-space:pre-wrap;word-break:break-word;opacity:0.9;"></div>
        <div style="margin-top:16px;">
          <button id="app-crash-reload" style="background:#0ea5e9;color:#0b1220;border:none;border-radius:8px;padding:8px 12px;font:600 12px system-ui;cursor:pointer;">Reload</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
