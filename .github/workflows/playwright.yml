name: Playwright Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aep
          POSTGRES_PASSWORD: aep_test
          POSTGRES_DB: aep_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: |
          package-lock.json
          server/package-lock.json
          web/package-lock.json
    
    - name: Install dependencies (server)
      working-directory: ./server
      run: npm ci
    
    - name: Install dependencies (web)
      working-directory: ./web
      run: npm ci
    
    - name: Install Playwright Browsers
      working-directory: ./web
      run: npx playwright install --with-deps
    
    - name: Setup Database
      working-directory: ./server
      run: |
        npx prisma generate
        npx prisma db push --skip-generate
      env:
        DATABASE_URL: postgresql://aep:aep_test@localhost:5432/aep_test
    
    - name: Start Backend Server
      working-directory: ./server
      run: |
        npm run build
        npm start &
        for i in {1..60}; do
          (echo > /dev/tcp/127.0.0.1/3001) >/dev/null 2>&1 && break
          sleep 1
        done
        (echo > /dev/tcp/127.0.0.1/3001) >/dev/null 2>&1
      env:
        PORT: 3001
        NODE_ENV: test
        ALLOW_DEV_LOGIN: true
        DATABASE_URL: postgresql://aep:aep_test@localhost:5432/aep_test
        JWT_SECRET: github-actions-test-secret
        OPENAI_API_KEY: test-openai-key
    
    - name: Start Frontend Dev Server
      working-directory: ./web
      run: |
        npm run dev -- --host 127.0.0.1 --port 5174 --strictPort &
        for i in {1..60}; do
          (echo > /dev/tcp/127.0.0.1/5174) >/dev/null 2>&1 && break
          sleep 1
        done
        (echo > /dev/tcp/127.0.0.1/5174) >/dev/null 2>&1
    
    - name: Run Playwright tests
      working-directory: ./web
      run: >
        npx playwright test tests/auth-dashboard.spec.ts
        --project=chromium
        --grep "should display login page"
        --no-deps
        --reporter=list
      env:
        CI: true
        PW_USE_EXISTING_SERVER: true
        PW_BASE_URL: http://127.0.0.1:5174
        PLAYWRIGHT_API_BASE: http://127.0.0.1:5174/api
    
    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: web/playwright-report/
        retention-days: 30
    
    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: web/test-results/
        retention-days: 30

  test-api:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aep
          POSTGRES_PASSWORD: aep_test
          POSTGRES_DB: aep_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: |
          package-lock.json
          server/package-lock.json
          web/package-lock.json

    - name: Install dependencies (server)
      working-directory: ./server
      run: npm ci
    
    - name: Install dependencies
      working-directory: ./web
      run: npm ci

    - name: Setup Database
      working-directory: ./server
      run: |
        npx prisma generate
        npx prisma db push --skip-generate
      env:
        DATABASE_URL: postgresql://aep:aep_test@localhost:5432/aep_test

    - name: Start Backend Server
      working-directory: ./server
      run: |
        npm run build
        npm start &
        for i in {1..60}; do
          (echo > /dev/tcp/127.0.0.1/3001) >/dev/null 2>&1 && break
          sleep 1
        done
        (echo > /dev/tcp/127.0.0.1/3001) >/dev/null 2>&1
      env:
        PORT: 3001
        NODE_ENV: test
        ALLOW_DEV_LOGIN: true
        DATABASE_URL: postgresql://aep:aep_test@localhost:5432/aep_test
        JWT_SECRET: github-actions-test-secret
        OPENAI_API_KEY: test-openai-key
    
    - name: Run API tests
      working-directory: ./web
      run: npx playwright test tests/api-integration.spec.ts --project=api --reporter=list
      env:
        CI: true
        PW_USE_EXISTING_SERVER: true
        PW_BASE_URL: http://127.0.0.1:3001
        PLAYWRIGHT_API_BASE: http://127.0.0.1:3001/api
    
    - name: Upload API Test Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: api-test-report
        path: web/playwright-report/
        retention-days: 30
